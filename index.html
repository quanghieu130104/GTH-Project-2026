<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Tech Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 128, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1473448912268-2022ce9509d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white; padding: 100px 0; text-align: center;
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">Green Tech Hub</h1>
            <p class="lead mb-4">Technology for a Greener Future</p>
        </div>
    </section>

    <section class="py-5 bg-light" id="solutions">
        <div class="container">
            <h2 class="text-center mb-5 text-success">Các Giải Pháp Công Nghệ Xanh</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm"><div class="card-body text-center"><h5 class="text-success">Solar Energy</h5></div></div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm"><div class="card-body text-center"><h5 class="text-success">Waste Management</h5></div></div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm"><div class="card-body text-center"><h5 class="text-success">Smart Irrigation</h5></div></div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5" id="contact">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center mb-4 text-success">Liên Hệ Nhận Tư Vấn</h2>
                    <form class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Lời nhắn</label>
                            <textarea class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Gửi Thông Tin</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Validation script
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
